<!DOCTYPE html>
<html>
<head>
    <title>Data Archive - Planet Gallery</title>
    <script src="js/aframe.min.js"></script>
    <script src="js/components.js"></script>
</head>
<body>
    <a-scene fog="type: exponential; color: #010206; density: 0.02">
        <a-assets>
            <a-asset-item id="planet1" src="assets/planet1.glb"></a-asset-item>
            <a-asset-item id="planet2" src="assets/planet2.glb"></a-asset-item>
            <a-asset-item id="planet3" src="assets/planet3.glb"></a-asset-item>
        </a-assets>

        <a-sky color="#010206"></a-sky>
        <a-light type="ambient" color="#223344"></a-light>
        <a-light type="point" color="#FFF" intensity="1.2" position="0 5 0"></a-light>

        <a-camera position="0 1.6 5">
            <a-cursor raycaster="objects: .clickable" color="#00FFFF"></a-cursor>
        </a-camera>

        <a-plane rotation="-90 0 0" width="20" height="10" material="color: #0b0c10; metalness: 0.8; roughness: 0.3"></a-plane>
        
        <a-entity position="0 3.5 -4">
            <a-text value="PLANETARY EXHBIT ARCHIVE" align="center" color="#00FFFF" scale="1.5 1.5 1.5"></a-text>
        </a-entity>

        <a-entity position="-4 1.5 -2">
            <a-cylinder radius="0.6" height="0.3" position="0 -1.3 0" color="#222"></a-cylinder>
            <a-entity gltf-model="#planet1" scale="0.6 0.6 0.6" animation="property: rotation; to: 0 360 0; loop: true; dur: 10000; easing: linear"></a-entity>
            <a-ring radius-inner="1" radius-outer="1.1" rotation="90 0 0" material="color: #FF3333; emissive: #FF3333; side: double"></a-ring>
            <a-text value="PLANET: ARES-9" position="0 1.6 0" align="center" look-at="[camera]" scale="0.8 0.8 0.8"></a-text>
        </a-entity>

        <a-entity position="0 1.5 -2">
            <a-cylinder radius="0.6" height="0.3" position="0 -1.3 0" color="#222"></a-cylinder>
            <a-entity gltf-model="#planet2" scale="0.1 0.1 0.1" animation="property: rotation; to: 0 360 0; loop: true; dur: 12000; easing: linear"></a-entity>
            <a-ring radius-inner="1" radius-outer="1.1" rotation="90 0 0" material="color: #00FFFF; emissive: #00FFFF; side: double"></a-ring>
            <a-text value="PLANET: MULTI-PLANET" position="0 1.6 0" align="center" look-at="[camera]" scale="0.8 0.8 0.8"></a-text>
        </a-entity>

        <a-entity position="4 1.5 -2">
            <a-cylinder radius="0.6" height="0.3" position="0 -1.3 0" color="#222"></a-cylinder>
            <a-entity gltf-model="#planet3" scale="0.4 0.4 0.4" animation="property: rotation; to: 0 360 0; loop: true; dur: 15000; easing: linear"></a-entity>
            <a-ring radius-inner="1" radius-outer="1.1" rotation="90 0 0" material="color: #FFD700; emissive: #FFD700; side: double"></a-ring>
            <a-text value="PLANET: KEPLER-X" position="0 1.6 0" align="center" look-at="[camera]" scale="0.8 0.8 0.8"></a-text>
        </a-entity>

        <a-entity position="0 1 2" warp-portal="href: index.html">
            <a-circle radius="0.8" material="opacity: 0; transparent: true" class="clickable" position="0 0 0.1" look-at="[camera]"></a-circle>
            <a-ring class="warp-ring" radius-inner="0.4" radius-outer="0.5" material="color: #00FFFF; emissive: #00FFFF" look-at="[camera]"></a-ring>
            <a-text value="RETURN TO BASE CORE" position="0 -0.8 0" align="center" color="#FFF" scale="0.6 0.6 0.6" look-at="[camera]"></a-text>
        </a-entity>
    </a-scene>
</body>
</html>
