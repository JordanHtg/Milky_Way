<!DOCTYPE html>
<html>
<head>
    <title>Milky Way Observatory - Deep Space</title>
    
    <script src="js/aframe.min.js"></script>
    <script src="js/aframe-environment-component.min.js"></script>
    <script src="js/components.js"></script>
</head>
<body>
    <a-scene fog="type: exponential; color: #020208; density: 0.015">
        
        <a-assets timeout="10000">
            <a-asset-item id="roketModel" src="assets/model.glb"></a-asset-item>
            <a-asset-item id="planetGas" src="assets/planet1.glb"></a-asset-item>
            <a-asset-item id="spaceStation" src="assets/planet2.glb"></a-asset-item>
        </a-assets>

        <a-entity environment="preset: starry; groundColor: #020205; grid: none; skyType: atmosphere"></a-entity>
        
        <a-light type="ambient" color="#0b0c1f"></a-light>
        <a-light type="point" color="#4169E1" intensity="2" position="0 6 -3"></a-light>
        <a-light type="directional" color="#7B68EE" intensity="0.6" position="-1 2 1"></a-light>

        <a-camera position="0 1.8 5">
            <a-cursor raycaster="objects: .clickable" color="#00FFFF" animation__click="property: scale; startEvents: click; easing: easeInCubic; dur: 150; from: 0.1 0.1 0.1; to: 1 1 1"></a-cursor>
        </a-camera>

        <a-entity position="0 0 0">
            <a-cylinder radius="6" height="0.2" material="color: #080810; metalness: 0.8; roughness: 0.2"></a-cylinder>
            <a-ring radius-inner="5.8" radius-outer="6" rotation="-90 0 0" position="0 0.11 0" material="color: #00FFFF; emissive: #00FFFF; emissiveIntensity: 0.6"></a-ring>
            
            <a-entity position="-2.5 1.3 -2" animation="property: position; to: -2.5 1.6 -2; dur: 4000; dir: alternate; loop: true; easing: easeInOutSine">
                <a-box color="#7B68EE" scale="1 1 1" material="roughness: 0.3; metalness: 0.7; emissive: #1c0a3a" animation="property: rotation; to: 0 360 0; dur: 12000; loop: true; easing: linear"></a-box>
            </a-entity>

            <a-sphere position="0 2 -3" radius="0.8" color="#E0E0FF" material="metalness: 0.5; emissive: #E0E0FF; emissiveIntensity: 0.3" 
                      animation="property: material.opacity; from: 0.5; to: 1; dur: 2000; dir: alternate; loop: true"></a-sphere>

            <a-cylinder position="2.5 1.25 -2" radius="0.3" height="1.8" color="#4169E1" material="metalness: 0.8; roughness: 0.2" 
                        class="clickable" animation__spin="property: rotation; to: 0 720 0; dur: 2000; startEvents: click; easing: easeOutElastic"></a-cylinder>
            
            <a-cone position="4.2 1 -2" radius-bottom="0.4" height="1.3" color="#E0E0FF" material="metalness: 0.7" 
                    class="clickable" sci-fi-color-switch animation="property: rotation; to: 0 360 0; dur: 4000; loop: true; easing: linear"></a-cone>
            
            <a-sphere position="4.2 1.7 -2" radius="0.08" material="color: #FF0000; emissive: #FF0000" blink="interval: 500"></a-sphere>
        </a-entity>

        <a-entity gltf-model="#planetGas" position="-35 15 -20" scale="4 4 4" animation="property: rotation; to: 0 360 0; loop: true; dur: 180000; easing: linear"></a-entity>

        <a-entity position="20 -2 -15" rotation="0 -30 0">
            <a-cylinder radius="4" height="4" material="color: #1c1d24; metalness: 0.6"></a-cylinder>
            <a-entity gltf-model="#roketModel" position="15 2.1 15" scale="0.6 0.6 0.6" animation="property: position; to: 15 200 15; dur: 20000; dir: alternate; loop: true; easing: easeInOutSine"></a-entity>
        </a-entity>

        <a-entity gltf-model="#spaceStation" position="15 25 -60" scale="0.2 0.2 0.2" animation="property: rotation; to: 0 -360 0; loop: true; dur: 90000; easing: linear"></a-entity>

        <a-entity position="0 2 -5" warp-portal="href: scene2.html">
            <a-circle radius="2.2" material="opacity: 0; transparent: true" class="clickable" position="0 0 0.1"></a-circle>
            <a-torus class="warp-ring" radius="1.6" radius-tubular="0.04" material="color: #00FFFF; emissive: #00FFFF; emissiveIntensity: 0.8" animation="property: rotation; to: 0 0 -360; loop: true; dur: 5000; easing: linear"></a-torus>
            <a-torus radius="1.8" radius-tubular="0.015" material="color: #8A2BE2; emissive: #8A2BE2" animation="property: rotation; to: 0 0 360; loop: true; dur: 3000; easing: linear"></a-torus>
            <a-circle radius="1.5" material="color: #03030a; opacity: 0.95"></a-circle>
            <a-text value="INITIATE WARP\n[ MILKY WAY ]" position="0 0 0.12" align="center" color="#00FFFF" scale="0.7 0.7 0.7" animation="property: material.opacity; from: 0.6; to: 1; dur: 1000; dir: alternate; loop: true"></a-text>
        </a-entity>
    </a-scene>
</body>
</html>
