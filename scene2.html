<!DOCTYPE html>
<html>
<head>
    <title>Milky Way - Navigation Interface</title>
    <script src="js/aframe.min.js"></script>
    <script src="js/components.js"></script>
    
    <script>
        AFRAME.registerComponent('toggle-info', {
            init: function () {
                var el = this.el;
                el.addEventListener('click', function () {
                    // Mencari elemen panel info di dalam bungkusan entity yang sama
                    var panel = el.parentNode.querySelector('.info-panel');
                    if (panel) {
                        var isVisible = panel.getAttribute('visible');
                        // Membalikkan status visible (true -> false, false -> true)
                        panel.setAttribute('visible', !isVisible);
                    }
                });
            }
        });
    </script>
</head>
<body>
    <a-scene>
        <a-assets>
            <img id="panorama" src="assets/panorama.jpg">
        </a-assets>

        <a-sky src="#panorama" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0">
            <a-cursor raycaster="objects: .clickable" color="#00FFFF"></a-cursor>
        </a-camera>

        <a-ring radius-inner="2.5" radius-outer="2.6" rotation="-90 0 0" position="0 0.1 0" material="color: #00FFFF; emissive: #00FFFF; opacity: 0.2; transparent: true"></a-ring>

        <a-entity position="-5 5 -4">
            <a-sphere class="clickable" toggle-info radius="0.3" material="color: #7B68EE; emissive: #2A1B71"></a-sphere>
            <a-text value="Hotspot 1" position="0 0.6 0" align="center" look-at="[camera]" color="#FFF" scale="0.8 0.8 0.8"></a-text>
            <a-plane class="info-panel" visible="false" position="0 1.5 0" width="2.5" height="1" material="color: #000; opacity: 0.8" look-at="[camera]">
                <a-text value="Rasi Bintang \nGugusan bintang raksasa di langit malam." align="center" position="0 0 0.01" scale="0.5 0.5 0.5" color="#FFF"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="4 4 -5">
            <a-sphere class="clickable" toggle-info radius="0.3" material="color: #7B68EE; emissive: #2A1B71"></a-sphere>
            <a-text value="Hotspot 2" position="0 0.6 0" align="center" look-at="[camera]" color="#FFF" scale="0.8 0.8 0.8"></a-text>
            <a-plane class="info-panel" visible="false" position="0 1.5 0" width="2.5" height="1" material="color: #000; opacity: 0.8" look-at="[camera]">
                <a-text value=" Terpantau \nAwan debu dan gas kosmik tempat bintang lahir." align="center" position="0 0 0.01" scale="0.5 0.5 0.5" color="#FFF"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="0 7 -3">
            <a-sphere class="clickable" toggle-info radius="0.3" material="color: #7B68EE; emissive: #2A1B71"></a-sphere>
            <a-text value="Hotspot 3" position="0 0.6 0" align="center" look-at="[camera]" color="#FFF" scale="0.8 0.8 0.8"></a-text>
            <a-plane class="info-panel" visible="false" position="0 1.5 0" width="2.5" height="1" material="color: #000; opacity: 0.8" look-at="[camera]">
                <a-text value="Jalur Bima Sakti \nJarak: 2.5 Juta Tahun Cahaya\nJalur bimasakti membelah langit." align="center" position="0 0 0.01" scale="0.5 0.5 0.5" color="#FFF"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="-1 -1.5 -5">
            <a-sphere class="clickable" toggle-info radius="0.3" material="color: #00FA9A; emissive: #006400"></a-sphere>
            <a-text value="Hotspot 4" position="0 0.6 0" align="center" look-at="[camera]" color="#FFF" scale="0.8 0.8 0.8"></a-text>
            <a-plane class="info-panel" visible="false" position="0 1.5 0" width="3" height="1.2" material="color: #000; opacity: 0.8" look-at="[camera]">
                <a-text value="Aurora \nFenomena: Refleksi Astral memantulkan\n cahaya dari galaksi Bima Sakti di atasnya." align="center" position="0 0 0.01" scale="0.5 0.5 0.5" color="#FFF"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="-1.5 1 2.5" warp-portal="href: index.html">
            <a-circle radius="0.8" material="opacity: 0; transparent: true" class="clickable" position="0 0 0.1" look-at="[camera]"></a-circle>
            <a-ring class="warp-ring" radius-inner="0.5" radius-outer="0.6" material="color: #00FFFF; emissive: #00FFFF" look-at="[camera]"></a-ring>
            <a-text value="< BASE" position="0 0.8 0" align="center" color="#FFF" scale="0.6 0.6 0.6" look-at="[camera]"></a-text>
        </a-entity>
        
        <a-entity position="1.5 1 2.5" warp-portal="href: scene3-model.html">
            <a-circle radius="0.8" material="opacity: 0; transparent: true" class="clickable" position="0 0 0.1" look-at="[camera]"></a-circle>
            <a-ring class="warp-ring" radius-inner="0.5" radius-outer="0.6" material="color: #FF00FF; emissive: #FF00FF" look-at="[camera]"></a-ring>
            <a-text value="HANGAR >" position="0 0.8 0" align="center" color="#FFF" scale="0.6 0.6 0.6" look-at="[camera]"></a-text>
        </a-entity>
    </a-scene>
</body>
</html>
