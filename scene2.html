<!DOCTYPE html>
<html>
<head>
    <title>Milky Way - Navigation Interface</title>
    <script src="js/aframe.min.js"></script>
    <script src="js/components.js"></script>
</head>
<body>
    <a-scene fog="type: exponential; color: #000; density: 0.005">
        <a-assets>
            <img id="panorama" src="assets/panorama.jpg">
            <a-asset-item id="hotspotPlanet1" src="assets/planet1.glb"></a-asset-item>
            <a-asset-item id="hotspotPlanet2" src="assets/planet2.glb"></a-asset-item>
            <a-asset-item id="hotspotPlanet3" src="assets/planet3.glb"></a-asset-item>
        </a-assets>

        <a-sky src="#panorama" rotation="0 -90 0"></a-sky>

        <a-camera position="0 1.6 0">
            <a-cursor raycaster="objects: .clickable" color="#00FFFF"></a-cursor>
        </a-camera>

        <a-ring radius-inner="2.5" radius-outer="2.6" rotation="-90 0 0" position="0 0.1 0" material="color: #00FFFF; emissive: #00FFFF; opacity: 0.2; transparent: true"></a-ring>

        <a-entity position="-4 2 -4" animation="property: position; to: -4 2.15 -4; dir: alternate; loop: true; dur: 3000">
            <a-entity gltf-model="#hotspotPlanet1" scale="0.15 0.15 0.15" class="clickable" toggle-holo-ui animation="property: rotation; to: 0 360 0; loop: true; dur: 5000; easing: linear"></a-entity>
            <a-text value="[ RASI ORION ]" position="0 0.6 0" align="center" look-at="[camera]" color="#FFD700" scale="0.7 0.7 0.7"></a-text>
            <a-plane class="holo-panel" visible="false" position="0 1.3 0" width="2.2" height="0.8" material="color: #020715; opacity: 0.85" look-at="[camera]">
                <a-text value="Sektor: Orion Constellation\nStatus: Terpantau\nKarakteristik: Gugusan Bintang Induk" align="center" position="0 0 0.01" scale="0.5 0.5 0.5" color="#00FFFF"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="0 2.8 -5" animation="property: position; to: 0 2.95 -5; dir: alternate; loop: true; dur: 3500">
            <a-entity gltf-model="#hotspotPlanet2" scale="0.040 0.040 0.040" class="clickable" toggle-holo-ui animation="property: rotation; to: 0 -360 0; loop: true; dur: 6000; easing: linear"></a-entity>
            <a-text value="[ NEBULA MERAH ]" position="0 0.7 0" align="center" look-at="[camera]" color="#FF3333" scale="0.7 0.7 0.7"></a-text>
        </a-entity>

        <a-entity position="4 1.8 -4" animation="property: position; to: 4 1.95 -4; dir: alternate; loop: true; dur: 4000">
            <a-entity gltf-model="#hotspotPlanet3" scale="0.12 0.12 0.12" class="clickable" toggle-holo-ui animation="property: rotation; to: 360 360 0; loop: true; dur: 7000; easing: linear"></a-entity>
            <a-text value="[ GALAKSI JAUH ]" position="0 0.6 0" align="center" look-at="[camera]" color="#8A2BE2" scale="0.7 0.7 0.7"></a-text>
        </a-entity>

        <a-entity position="-3 3.5 -6" class="clickable" toggle-holo-ui>
            <a-sphere radius="0.35" material="color: #000; roughness: 1"></a-sphere>
            <a-ring radius-inner="0.45" radius-outer="0.9" material="color: #FF8C00; emissive: #FF8C00; side: double; opacity: 0.8; transparent: true" animation="property: rotation; to: 360 0 0; loop: true; dur: 2000; easing: linear"></a-ring>
            <a-text value="! BLACK HOLE OBSERVATORY !" position="0 1.2 0" align="center" look-at="[camera]" color="#FF8C00" scale="0.8 0.8 0.8"></a-text>
            <a-plane class="holo-panel" visible="false" position="0 2 0" width="2.5" height="0.8" material="color: #220202; opacity: 0.9" look-at="[camera]">
                <a-text value="DANGER: Singularitas Gravitasi\nKategori: Supermassive Black Hole\nRadius Event Horizon: Terdeteksi" align="center" position="0 0 0.01" color="#FF3333" scale="0.5 0.5 0.5"></a-text>
            </a-plane>
        </a-entity>

        <a-entity position="-1.5 1 2.5" warp-portal="href: index.html">
            <a-circle radius="0.8" material="opacity: 0; transparent: true" class="clickable" position="0 0 0.1" look-at="[camera]"></a-circle>
            <a-ring class="warp-ring" radius-inner="0.5" radius-outer="0.6" material="color: #00FFFF; emissive: #00FFFF" look-at="[camera]"></a-ring>
            <a-text value="< BASE" position="0 0.8 0" align="center" color="#FFF" scale="0.6 0.6 0.6" look-at="[camera]"></a-text>
        </a-entity>
        <a-entity position="1.5 1 2.5" warp-portal="href: scene3-model.html">
            <a-circle radius="0.8" material="opacity: 0; transparent: true" class="clickable" position="0 0 0.1" look-at="[camera]"></a-circle>
            <a-ring class="warp-ring" radius-inner="0.5" radius-outer="0.6" material="color: #FF00FF; emissive: #FF00FF" look-at="[camera]"></a-ring>
            <a-text value="HANGAR >" position="0 0.8 0" align="center" color="#FFF" scale="0.6 0.6 0.6" look-at="[camera]"></a-text>
        </a-entity>
    </a-scene>
</body>
</html>
